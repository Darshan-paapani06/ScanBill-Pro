<svg width="800" height="130" viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="author-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1208"/>
      <stop offset="100%" stop-color="#0a0704"/>
    </radialGradient>
    <linearGradient id="author-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c98a3e"/>
      <stop offset="40%" stop-color="#f0c060"/>
      <stop offset="100%" stop-color="#c98a3e"/>
      <animate attributeName="x1" values="-100%;0%;-100%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="author-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="130" fill="url(#author-bg)" rx="14"/>

  <!-- Subtle radial glow center -->
  <ellipse cx="400" cy="65" rx="300" ry="60" fill="#d4a843" opacity="0.04">
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Orbit ring around initials -->
  <g transform="translate(80,65)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.3">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="#d4a843" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
    <!-- Orbiting dot -->
    <circle cx="44" cy="0" r="4" fill="#d4a843">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Initials circle -->
    <circle cx="0" cy="0" r="28" fill="#1a0e06" stroke="#d4a843" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, serif" font-size="20" font-weight="900"
          fill="#d4a843">
      DP
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- LEAD ARTISAN label -->
  <text x="158" y="38" text-anchor="start"
        font-family="'Courier New', monospace" font-size="9"
        letter-spacing="5" fill="#d4a843" opacity="0.6">
    LEAD ARTISAN
  </text>

  <!-- Darshan in white -->
  <text x="158" y="85" text-anchor="start"
        font-family="Georgia, 'Times New Roman', serif" font-size="48"
        font-weight="900" fill="white" filter="url(#author-glow)"
        letter-spacing="-1">
    Darshan
    <animate attributeName="opacity" values="1;0.75;1;1;1;0.8;1" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- Paapani in gold -->
  <text x="390" y="85" text-anchor="start"
        font-family="Georgia, 'Times New Roman', serif" font-size="48"
        font-weight="900" fill="url(#author-gold)" filter="url(#author-glow)"
        letter-spacing="-1">
    Paapani
  </text>

  <!-- Role line -->
  <text x="158" y="112" text-anchor="start"
        font-family="Georgia, 'Times New Roman', serif" font-size="13"
        font-style="italic" fill="#d4a843" opacity="0.5">
    Crafted with classical elegance &amp; premium motion design
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
