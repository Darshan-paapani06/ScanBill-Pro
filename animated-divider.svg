<svg width="800" height="20" viewBox="0 0 800 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#c98a3e" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="70%" stop-color="#c98a3e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
      <animate attributeName="x1" values="0%;-100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="10" x2="800" y2="10" stroke="url(#div-grad)" stroke-width="1"/>
  <circle cx="400" cy="10" r="3" fill="#d4a843" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
