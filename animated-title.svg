<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2b1509"/>
      <stop offset="100%" stop-color="#0a0704"/>
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c98a3e"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#c98a3e"/>
      <animate attributeName="x1" values="0%;-100%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="scanline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#d4a843" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg-glow)" rx="16"/>

  <!-- Grid lines horizontal -->
  <g opacity="0.06" stroke="#d4a843" stroke-width="0.5">
    <line x1="0" y1="32" x2="800" y2="32"/>
    <line x1="0" y1="64" x2="800" y2="64"/>
    <line x1="0" y1="96" x2="800" y2="96"/>
    <line x1="0" y1="128" x2="800" y2="128"/>
  </g>
  <!-- Grid lines vertical -->
  <g opacity="0.06" stroke="#d4a843" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="500" y1="0" x2="500" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="700" y1="0" x2="700" y2="160"/>
  </g>

  <!-- Scan line sweeping -->
  <rect x="0" y="0" width="800" height="2" fill="url(#scanline-grad)" rx="1">
    <animate attributeName="y" values="10;150;10" dur="4s" repeatCount="indefinite" calcMode="ease-in-out"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets -->
  <g stroke="#d4a843" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="16,40 16,16 40,16"/>
    <polyline points="760,16 784,16 784,40"/>
    <polyline points="16,120 16,144 40,144"/>
    <polyline points="760,144 784,144 784,120"/>
  </g>

  <!-- Eyebrow label -->
  <text x="400" y="32" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        letter-spacing="6" fill="#d4a843" opacity="0.7"
        font-weight="400">
    A CURATED RETAIL LEDGER
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- SCAN in white -->
  <text x="182" y="112" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="78"
        font-weight="900" fill="white" filter="url(#text-glow)"
        letter-spacing="-2">
    Scan
    <animate attributeName="opacity" values="1;0.6;1;1;1;1;0.7;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- BILL in gold -->
  <text x="400" y="112" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="78"
        font-weight="900" fill="url(#gold-grad)" filter="url(#text-glow)"
        letter-spacing="-2">
    Bill
  </text>

  <!-- PRO superscript -->
  <text x="558" y="72" text-anchor="start"
        font-family="Georgia, 'Times New Roman', serif" font-size="22"
        font-weight="400" font-style="italic" fill="#d4a843">
    PRO
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <!-- Pulsing dots -->
  <g>
    <circle cx="370" cy="140" r="3.5" fill="#d4a843">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="400" cy="140" r="3.5" fill="#d4a843">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="430" cy="140" r="3.5" fill="#d4a843">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
</svg>
